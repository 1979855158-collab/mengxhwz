<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>孟祥昊 | MENG XIANGHAO - UX/Product Designer</title>
  <style>
    /* CSS 变量与主题 */
    :root {
      --color-black: #000000;
      --color-bg-card: #080808;
      --color-bg-card-hover: #0a0000;
      --color-border-dark: #333333;
      --color-border-light: #222222;
      --color-text-main: #ffffff;
      --color-text-sub: #888888;
      --color-text-bio: #cccccc;
      --color-text-tag: #999999;
      --color-accent-red: #8B0000;
      --font-sans: "Helvetica Neue", Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--color-black);
      color: var(--color-text-main);
      font-family: var(--font-sans);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    
    .container {
      max-width: 1024px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* 导航栏 */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 24px 0;
      transition: all 0.3s ease;
    }
    nav.scrolled {
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      padding: 16px 0;
      border-bottom: 1px solid var(--color-border-dark);
    }
    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 24px; font-weight: bold; letter-spacing: -0.5px; }
    .logo span { color: var(--color-accent-red); }
    .nav-links { display: none; gap: 32px; font-size: 10px; font-weight: 500; letter-spacing: 1px; color: var(--color-text-sub); }
    @media (min-width: 768px) { .nav-links { display: flex; } }
    .nav-links a:hover { color: var(--color-text-main); }

    /* Hero 区域 */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 80px;
    }
    .hero-glow {
      position: absolute;
      top: 25%; left: 25%;
      width: 384px; height: 384px;
      background: var(--color-accent-red);
      border-radius: 50%;
      filter: blur(128px);
      mix-blend-mode: screen;
      opacity: 0.2;
      z-index: 0;
      pointer-events: none;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
      align-items: center;
      position: relative;
      z-index: 10;
    }
    @media (min-width: 768px) { .hero-grid { grid-template-columns: 1fr 1fr; } }
    
    .hero-label { font-size: 10px; color: var(--color-text-sub); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; display: inline-block; }
    .hero h1 { font-size: 48px; font-weight: bold; line-height: 1.2; letter-spacing: -1px; margin-bottom: 8px; }
    @media (min-width: 768px) { .hero h1 { font-size: 64px; } }
    .hero h1 span { color: var(--color-accent-red); }
    .hero h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--color-text-sub); margin-bottom: 32px; font-weight: normal; }
    .hero p { font-size: 14px; color: var(--color-text-bio); max-width: 500px; margin-bottom: 48px; }
    
    .btn-group { display: flex; flex-wrap: wrap; gap: 16px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 16px 32px; font-size: 12px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s;
    }
    .btn-primary { background: white; color: black; }
    .btn-primary:hover { background: var(--color-accent-red); color: white; }
    .btn-outline { border: 1px solid var(--color-border-dark); color: var(--color-text-main); }
    
    /* 作品卡片 */
    .card {
      border: 1px solid var(--color-border-light);
      background: var(--color-bg-card);
      padding: 24px;
      cursor: pointer;
      display: flex; flex-direction: column;
      height: 100%;
      transition: all 0.3s;
    }
    .card:hover { border-color: var(--color-accent-red); background: var(--color-bg-card-hover); }
    .card-cat { font-size: 10px; color: var(--color-accent-red); font-weight: bold; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .card-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .card-img-wrapper {
      width: 100%; aspect-ratio: 4/3; margin-bottom: 16px;
      background: #0f0f0f; border: 1px solid var(--color-border-dark);
      position: relative; overflow: hidden;
    }
    .card-img-wrapper img { width: 100%; height: 100%; object-fit: contain; padding: 8px; transition: 0.7s; }
    .card:hover .card-img-wrapper img { transform: scale(1.05); }

    /* 弹窗 */
    #modal {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 16px;
    }
    #modal.active { display: flex; }
    .modal-content {
      background: var(--color-bg-card); border: 1px solid var(--color-border-dark);
      width: 100%; max-width: 1024px; height: 90vh; overflow-y: auto;
      position: relative;
    }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; z-index: 50; }

    #wechat-qr {
      position: absolute; bottom: calc(100% + 12px); right: 0; 
      width: 160px; height: 160px; background: white; 
      padding: 12px; border-radius: 12px; display: none;
    }
    #wechat-qr img { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <nav id="navbar">
    <div class="container nav-inner">
      <div class="logo">MENG<span>XH</span></div>
      <div class="nav-links">
        <a href="#about">ABOUT</a>
        <a href="#portfolio">PORTFOLIO</a>
        <a href="#beyond">MY LIFE</a>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-glow"></div>
    <div class="container hero-grid">
      <div>
        <span class="hero-label">About</span>
        <h1>孟祥昊<br><span>MENG</span> XIANGHAO</h1>
        <h2>UX Designer / 工业设计</h2>
        <p>以前瞻性视角探索数字交互、物理空间与产品逻辑的边界。</p>
        <div class="btn-group">
          <a href="#portfolio" class="btn btn-primary">探索作品</a>
          <a href="./public/孟祥昊_产品体验设计师_韩国弘益大学硕士_2026届应届毕业生.pdf" download class="btn btn-outline">下载简历</a>
        </div>
      </div>
      <div class="hero-image-wrapper" style="display:block; max-width:400px; margin-left:auto;">
        <img src="./public/portrait.webp" style="width:100%; border: 1px solid var(--color-border-dark);">
      </div>
    </div>
  </section>

  <section id="portfolio" style="padding: 96px 0; border-top: 1px solid var(--color-border-dark);">
    <div class="container">
      <h2 style="font-size: 48px; margin-bottom: 60px;">PORTFOLIO <span>/</span> 作品集</h2>
      <div class="portfolio-grid" id="portfolio-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;"></div>
    </div>
  </section>

  <section id="beyond" style="padding: 96px 0; border-top: 1px solid var(--color-border-dark);">
    <div class="container">
      <h2 style="font-size: 48px; margin-bottom: 60px;">MY LIFE <span>/</span> 生活中的我</h2>
      <div class="portfolio-grid" id="life-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;"></div>
    </div>
  </section>

  <footer id="contact" style="padding: 64px 0; border-top: 1px solid var(--color-border-dark);">
    <div class="container">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>诚邀合作 <span>/</span></h2>
        <div onmouseover="showQR()" onmouseout="hideQR()" style="position:relative; cursor:pointer; color:var(--color-accent-red);">
          微信扫码 / WECHAT
          <div id="wechat-qr"><img src="./public/wechat-qr.webp"></div>
        </div>
      </div>
    </div>
  </footer>

  <div id="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-body-content" style="padding:40px;"></div>
    </div>
  </div>

  <script>
    // --- 完整找回项目数据 ---
    const projects = [
      { title: "梦到（꾸며)", category: "UX Design", image: "mengdao.webp", description: "基于 AI 视觉的梦境社交系统。" },
      { title: "YUNYOU", category: "UX Design", image: "yunyou/新封面.webp", description: "游戏玩家 SNS 互助平台。" },
      { title: "旧时光", category: "Spatial Design", image: "jsgfm.webp", description: "传统糖水铺商业空间设计。" },
      { title: "海带", category: "Product Design", image: "haidaifm.webp", description: "可持续材料产品设计。" },
      { title: "智能手杖", category: "Hardware Design", image: "shouzhangfm.webp", description: "针对老年人的智能辅助设备。" }
    ];

    const activities = [
      {
        title: "留子变厨子",
        description: "你可以怀疑我的学历，但是不能怀疑我的厨艺！",
        image: "zuofanfm.webp",
        videos: [{ title: "厨艺展示", url: "https://v.douyin.com/7Pzn54nR-RQ/" }]
      },
      {
        title: "没事儿就爱旅点儿游",
        description: "人就应该待在没有天花板的地方。",
        image: "lvxingfm.webp",
        videos: [
          { title: "新疆旅行", url: "https://v.douyin.com/VvgoRpvBiXc/" },
          { title: "福建旅行", url: "https://v.douyin.com/ZoP0jcP3DP0/" }
        ]
      }
    ];

    function initPortfolio() {
      const container = document.getElementById('portfolio-container');
      projects.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openModal(i);
        card.innerHTML = `<div class="card-cat">${p.category}</div><div class="card-title">${p.title}</div><div class="card-img-wrapper"><img src="./public/${p.image}"></div><p style="font-size:12px; color:var(--color-text-sub);">${p.description}</p>`;
        container.appendChild(card);
      });
    }

    function initLife() {
      const container = document.getElementById('life-container');
      activities.forEach(act => {
        const card = document.createElement('div');
        card.className = 'card';
        let videoOverlay = '';
        if (act.videos) {
          videoOverlay = `<div class="video-overlay" style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:rgba(0,0,0,0.6); opacity:0; transition:0.3s; z-index:10;">
              ${act.videos.map(v => `<a href="${v.url}" target="_blank" style="background:var(--color-accent-red); color:white; padding:8px 15px; border-radius:20px; font-size:11px;">▶ ${v.title}</a>`).join('')}
            </div>`;
        }
        card.innerHTML = `<div class="card-img-wrapper" style="position:relative; aspect-ratio:1/1;" onmouseover="this.querySelector('.video-overlay').style.opacity='1'" onmouseout="this.querySelector('.video-overlay').style.opacity='0'">
            <img src="./public/${act.image}" style="object-fit:cover; width:100%; height:100%;">${videoOverlay}</div>
          <div class="card-title" style="margin-top:15px;">${act.title}</div>`;
        container.appendChild(card);
      });
    }

    function openModal(idx) {
      const p = projects[idx];
      document.getElementById('modal-body-content').innerHTML = `<h2>${p.title}</h2><br><img src="./public/${p.image}" style="width:100%;"><p style="margin-top:20px;">${p.description}</p>`;
      document.getElementById('modal').classList.add('active');
    }
    function closeModal() { document.getElementById('modal').classList.remove('active'); }
    function showQR() { document.getElementById('wechat-qr').style.display = 'block'; }
    function hideQR() { document.getElementById('wechat-qr').style.display = 'none'; }

    window.onload = () => { initPortfolio(); initLife(); };
  </script>
</body>
</html>
